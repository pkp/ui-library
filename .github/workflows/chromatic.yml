# .github/workflows/chromatic.yml
name: 'Chromatic'

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  chromatic-deployment:
    # Temporarily disabled – remove the `if: false` line to re-enable
    if: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # 👇 This is the official fix so TurboSnap works on pull_request events
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
        env:
          # These env vars help Chromatic track the right commit/branch even on forks
          CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
          CHROMATIC_SLUG: ${{ github.repository }}

      - name: Install dependencies
        run: npm install

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          # 👇 For open-source repos with forks, you must expose the token in plaintext
          projectToken: chpt_d560551f1e4c0c7
          onlyChanged: true   # ← enables TurboSnap